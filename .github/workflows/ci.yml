name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: mindplan check (dirty src + packages)
        if: github.event_name == 'pull_request'
        run: node dist/index.js check --base ${{ github.event.pull_request.base.sha }}
      - name: mindplan check --for-main
        run: node dist/index.js check --for-main
